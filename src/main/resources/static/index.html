<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아파트 실거래가 조회</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="aurora"></div>

    <header class="site-header">
        <div class="brand">
            <span class="brand-mark">RE</span>
            <div class="brand-text">
                <h1>아파트 실거래가 조회</h1>
                <p>국토교통부 공공데이터 기반 · 지역별 최신 거래 정보</p>
            </div>
        </div>
        <div class="clock" id="clock">
            <div class="clock-date" id="clockDate">-</div>
            <div class="clock-time" id="clockTime">-</div>
        </div>
    </header>

    <main class="container">
        <section class="card search-card">
            <h2>지역 · 기간 선택</h2>
            <form id="searchForm" class="search-form">
                <div class="field">
                    <label for="sido">시 · 도</label>
                    <select id="sido" required>
                        <option value="">시 · 도 선택</option>
                    </select>
                </div>
                <div class="field">
                    <label for="sigungu">시 · 군 · 구</label>
                    <select id="sigungu" required disabled>
                        <option value="">먼저 시 · 도를 선택하세요</option>
                    </select>
                </div>
                <div class="field">
                    <label for="dealYmd">계약 년월</label>
                    <input type="month" id="dealYmd" required />
                </div>
                <div class="field action">
                    <button type="submit" id="submitBtn">조회하기</button>
                </div>
            </form>
        </section>

        <section class="card result-card">
            <div class="result-header">
                <h2>조회 결과</h2>
                <div class="result-meta" id="resultMeta">조회 조건을 선택하고 조회 버튼을 눌러주세요.</div>
            </div>
            <div id="resultArea" class="result-area">
                <div class="empty-state">
                    <div class="empty-icon">○</div>
                    <p>아직 조회된 데이터가 없습니다.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>Data source · 국토교통부 실거래가 정보 (운영: 한국부동산원)</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
